name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    name: flake eval (instantiation)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: fragment evaluates
        run: nix eval .#registryFragment --apply builtins.attrNames
      - name: foot instantiates (no build)
        run: |
          nix eval --raw .#packages.aarch64-darwin.foot-ios.drvPath
          nix eval --raw .#packages.aarch64-darwin.foot-macos.drvPath

  build:
    name: build foot
    runs-on: macos-15
    needs: eval
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix build .#packages.aarch64-darwin.foot-macos -L
